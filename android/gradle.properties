org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.compiler.execution.strategy=in-process
org.gradle.daemon=false
# Disable parallel builds to avoid CMake file-lock race conditions on Windows
org.gradle.parallel=false
org.gradle.workers.max=1
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Force only x86_64 ABI for emulator builds
android.abi=x86_64
android.injected.build.abi=x86_64
kotlin.compiler.execution.strategy=in-process
android.skipSplitAbi=true
